services:
  api:
    build:
      context: .
    image: secure-docker-api:local
    container_name: secure-docker-api
    env_file:
      - .env.dev.example
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
