name: pr-validation

on:
  pull_request:
    branches:
      - dev
      - main
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Ruff lint
        run: python -m ruff check .

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest

  docker-build:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t secure-docker-api:${{ github.sha }} .

  container-smoke-tests:
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4
      - name: Start stack
        run: docker compose --env-file .env.dev.example up --build -d
      - name: Wait for container health
        run: |
          for i in {1..20}; do
            status="$(docker inspect --format='{{json .State.Health.Status}}' secure-docker-api || true)"
            if [ "$status" = '"healthy"' ]; then
              exit 0
            fi
            sleep 3
          done
          docker compose logs
          exit 1
        shell: bash
      - name: Smoke test endpoints
        run: ./scripts/smoke-test.sh
        shell: bash
      - name: Teardown
        if: always()
        run: docker compose down --remove-orphans

  image-scan:
    runs-on: ubuntu-latest
    needs: container-smoke-tests
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t secure-docker-api:${{ github.sha }} .
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: secure-docker-api:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
