name: release-promotion

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: secure-docker-api-prod-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: main
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ vars.PYTHON_VERSION || '3.11' }}
      - name: Build release notes snippet
        run: |
          {
            echo "## Release promotion summary"
            echo "- Source branch: main"
            echo "- Target branch: prod"
            echo "- Commit: $GITHUB_SHA"
            echo "- Reminder: prod promotion requires manual approval and rollback notes."
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Generate release manifest
        run: |
          mkdir -p artifacts
          python scripts/create-release-manifest.py artifacts/release-manifest.json
      - name: Upload release manifest
        uses: actions/upload-artifact@v4
        with:
          name: secure-docker-api-release-manifest
          path: artifacts/release-manifest.json

  validate-before-promotion:
    uses: ./.github/workflows/pr-validation.yml
    with:
      environment_name: main
      env_file: .env.main.example

  publish-release-artifact:
    runs-on: ubuntu-latest
    needs: validate-before-promotion
    timeout-minutes: 15
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ vars.PYTHON_VERSION || '3.11' }}
      - name: Create artifact bundle
        run: |
          mkdir -p artifacts
          tar -czf artifacts/secure-docker-api-${GITHUB_SHA}.tar.gz app Dockerfile docker-compose.yml requirements.txt
          python scripts/create-release-manifest.py artifacts/release-manifest.json
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: secure-docker-api-release
          path: artifacts/

  prod-approval-note:
    runs-on: ubuntu-latest
    needs: publish-release-artifact
    timeout-minutes: 10
    environment: prod
    steps:
      - name: Manual promotion reminder
        run: |
          echo "Promotion to prod must be completed by PR from main to prod after approval."
