name: protected-main-validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secure-docker-api-main-protected-${{ github.ref }}
  cancel-in-progress: false

jobs:
  approval-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: main
    steps:
      - name: Protected branch approval
        run: echo "Main validation approved. Starting protected checks."

  protected-checks:
    needs: approval-gate
    uses: ./.github/workflows/pr-validation.yml
    with:
      environment_name: main
      env_file: .env.main.example
      python_version: ${{ vars.PYTHON_VERSION || '3.11' }}
      app_env: ${{ vars.APP_ENV || 'main' }}
      app_version: ${{ vars.APP_VERSION || '0.1.0-rc' }}
      trivy_severity: ${{ vars.TRIVY_SEVERITY || 'CRITICAL,HIGH' }}
      app_host: ${{ vars.APP_HOST || '0.0.0.0' }}
      app_port: ${{ vars.APP_PORT || '8080' }}
      gunicorn_workers: ${{ vars.GUNICORN_WORKERS || '2' }}
      gunicorn_threads: ${{ vars.GUNICORN_THREADS || '2' }}
      gunicorn_timeout: ${{ vars.GUNICORN_TIMEOUT || '30' }}
