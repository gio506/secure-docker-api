name: protected-prod-validation

on:
  push:
    branches:
      - prod
  pull_request:
    branches:
      - prod
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secure-docker-api-prod-protected-${{ github.ref }}
  cancel-in-progress: false

jobs:
  approval-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: prod
    steps:
      - name: Protected branch approval
        run: echo "Prod validation approved. Starting protected checks."

  protected-checks:
    needs: approval-gate
    uses: ./.github/workflows/pr-validation.yml
    with:
      environment_name: prod
      env_file: .env.prod.example
      python_version: "3.11"
      app_env: "prod"
      app_version: "0.1.0"
      trivy_severity: "CRITICAL,HIGH"
      app_host: "0.0.0.0"
      app_port: "8080"
      gunicorn_workers: "2"
      gunicorn_threads: "2"
      gunicorn_timeout: "30"
