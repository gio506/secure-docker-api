name: protected-prod-validation

on:
  push:
    branches:
      - prod
  pull_request:
    branches:
      - prod
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secure-docker-api-prod-protected-${{ github.ref }}
  cancel-in-progress: false

jobs:
  approval-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: prod
    steps:
      - name: Protected branch approval
        run: echo "Prod validation approved. Starting protected checks."

  lint:
    runs-on: ubuntu-latest
    needs: approval-gate
    timeout-minutes: 10
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Ruff lint
        run: python -m ruff check .
      - name: Ruff format check
        run: python -m ruff format --check .

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run tests
        run: |
          mkdir -p reports
          python -m pytest --junitxml reports/pytest-report.xml --tb=short -q

  docker-build:
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 15
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        run: |
          docker build \
            --build-arg BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --build-arg VCS_REF="${GITHUB_SHA}" \
            --build-arg APP_ENV="prod" \
            --build-arg APP_VERSION="0.1.0" \
            -t secure-docker-api:${{ github.sha }} .

  container-smoke-tests:
    runs-on: ubuntu-latest
    needs: docker-build
    timeout-minutes: 15
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - name: Start stack
        env:
          APP_ENV: prod
          APP_VERSION: 0.1.0
          APP_HOST: 0.0.0.0
          APP_PORT: 8080
          GUNICORN_WORKERS: 2
          GUNICORN_THREADS: 2
          GUNICORN_TIMEOUT: 30
        run: docker compose --env-file .env.prod.example up --build -d
      - name: Wait for container health
        run: |
          for i in {1..20}; do
            status="$(docker inspect --format='{{json .State.Health.Status}}' secure-docker-api || true)"
            if [ "$status" = '"healthy"' ]; then
              exit 0
            fi
            sleep 3
          done
          docker compose logs
          exit 1
        shell: bash
      - name: Smoke test endpoints
        run: bash ./scripts/smoke-test.sh
        shell: bash
      - name: Teardown
        if: always()
        run: docker compose down --remove-orphans --volumes

  image-scan:
    runs-on: ubuntu-latest
    needs: container-smoke-tests
    timeout-minutes: 20
    environment: prod
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Build image for scanning
        run: |
          docker build \
            --build-arg BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --build-arg VCS_REF="${GITHUB_SHA}" \
            --build-arg APP_ENV="prod" \
            --build-arg APP_VERSION="0.1.0" \
            -t secure-docker-api:${{ github.sha }} .
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: secure-docker-api:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
