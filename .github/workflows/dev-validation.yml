name: dev-validation

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secure-docker-api-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-dev:
    uses: ./.github/workflows/pr-validation.yml
    with:
      environment_name: dev
      env_file: .env.dev.example
      python_version: "3.11"
      app_env: "dev"
      app_version: "0.1.0-dev"
      trivy_severity: "CRITICAL,HIGH"
      app_host: "0.0.0.0"
      app_port: "8080"
      gunicorn_workers: "2"
      gunicorn_threads: "2"
      gunicorn_timeout: "30"
