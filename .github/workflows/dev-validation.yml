name: dev-validation

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secure-docker-api-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-dev:
    uses: ./.github/workflows/pr-validation.yml
    with:
      environment_name: dev
      env_file: .env.dev.example
